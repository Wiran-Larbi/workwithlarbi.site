[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/now"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/now/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/uses"
  to = "/tools/"
  status = 301
  force = true

[[redirects]]
  from = "/uses/"
  to = "/tools/"
  status = 301
  force = true

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.usefathom.com; connect-src 'self' https://api.github.com https://cdn.usefathom.com https://collect.usefathom.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
